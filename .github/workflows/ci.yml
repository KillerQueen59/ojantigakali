name: CI / CD

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────
  # Job 1: Lint · Type-check · Test
  # Runs on every push and every PR targeting main
  # ─────────────────────────────────────────────
  ci:
    name: Lint, Type-check & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Type-check
        run: npx tsc --noEmit

      - name: Test
        run: npm test -- --run

  # ─────────────────────────────────────────────
  # Job 2: Deploy to Vercel
  # Only runs on direct pushes (not PRs).
  # main  → production deployment
  # other → preview deployment
  #
  # Required secrets (Settings → Secrets → Actions):
  #   VERCEL_TOKEN      — from vercel.com/account/tokens
  #   VERCEL_ORG_ID     — from .vercel/project.json after `vercel link`
  #   VERCEL_PROJECT_ID — from .vercel/project.json after `vercel link`
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy to Vercel
    needs: ci
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel environment info (production)
        if: github.ref == 'refs/heads/main'
        run: vercel pull --yes --environment=production --token=$VERCEL_TOKEN

      - name: Pull Vercel environment info (preview)
        if: github.ref != 'refs/heads/main'
        run: vercel pull --yes --environment=preview --token=$VERCEL_TOKEN

      - name: Build project (production)
        if: github.ref == 'refs/heads/main'
        run: vercel build --prod --token=$VERCEL_TOKEN

      - name: Build project (preview)
        if: github.ref != 'refs/heads/main'
        run: vercel build --token=$VERCEL_TOKEN

      - name: Deploy to Vercel (production)
        if: github.ref == 'refs/heads/main'
        run: vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN

      - name: Deploy to Vercel (preview)
        if: github.ref != 'refs/heads/main'
        run: vercel deploy --prebuilt --token=$VERCEL_TOKEN
